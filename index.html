<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Explore the recordings and materials from our exclusive bonus insight sessions. Premium investing resources, scripts, and playbooks.">
    <title>Exclusive Bonus Insight Sessions | SuperInvesting.ai</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Ambient glowing backgrounds -->
    <div class="glow-bg glow-purple"></div>
    <div class="glow-bg glow-emerald"></div>
    <div class="grid-overlay"></div>

    <header class="header">
        <div class="header-nav">
            <a href="https://superinvesting.ai" class="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="back-icon"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Exclusive Bonus Sessions
            </a>
            <div class="logo-container">
                <img src="superinvesting-logo.webp" alt="SuperInvesting Logo" id="logo" class="logo">
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Main Consumption Hub (Video + Resources) -->
        <div class="consumption-hub">
            
            <!-- Left Side: Sticky Video Player & Details -->
            <div class="player-section">
                <div class="video-container">
                    <iframe id="videoPlayer" src="" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
                </div>
                <div class="session-info">
                    <h1 id="sessionTitle" class="session-title">Loading...</h1>
                    <div class="session-meta">
                        <span id="sessionDate" class="date-highlight">Loading...</span>
                        <span id="sessionDuration" class="duration-badge">Loading...</span>
                        <a id="youtubeExternalLink" href="" target="_blank" class="watch-on-yt">
                            Watch on YouTube
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="external-icon"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                        </a>
                    </div>
                    <p id="sessionDesc" class="session-desc">Loading description...</p>
                </div>
            </div>

            <!-- Right Side: Resources Container -->
            <div class="resources-section">
                <div class="resources-card">
                    <div class="card-glow"></div>
                    <div class="resources-header">
                        <span class="resource-count-badge">Included</span>
                        <h3 class="resources-heading">Resources</h3>
                    </div>
                    <div id="resourceList" class="resource-list">
                        <!-- Rendered dynamically -->
                    </div>
                </div>
            </div>

        </div>

        <!-- Divider -->
        <hr class="section-divider">

        <!-- Bottom: Playlist (Other Sessions) -->
        <div class="playlist-section">
            <h3 class="playlist-heading">More Sessions</h3>
            <div id="playlistContainer" class="playlist-grid">
                <!-- Rendered dynamically -->
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 SuperInvesting.ai. All rights reserved. For authorized member use only.</p>
    </footer>

    <!-- JavaScript to Handle Session State & Dynamic Renders -->
    <script>
        // Session Database Array
        const sessions = [
            {
                id: 1,
                sessionNumber: "Session 01",
                title: "Automotive & Pharmaceutical Sector Deep-Dive",
                desc: "Comprehensive analysis of growth drivers, regulatory environment, and competitive landscape in India's Auto and Pharma sectors.",
                date: "May 16, 2026",
                duration: "95 mins",
                videoId: "zvNfYHHbf6A",
                resources: [
                    { name: "India Auto Sector Analysis", type: "pdf", url: "https://drive.google.com/file/d/1380oEq_fvQJeldAbqpGRjZHkkFi3afex/view?usp=sharing" },
                    { name: "India Pharma Sector Analysis", type: "pdf", url: "https://drive.google.com/file/d/1HIzQD0R-eGcIPxvbhcI-dxp2TBVS3uaS/view?usp=sharing" }
                ]
            },
            {
                id: 2,
                sessionNumber: "Session 02",
                title: "BESS Sector Analysis & Stock Prompts",
                desc: "An evaluation of Battery Energy Storage Systems (BESS) trends and customized prompts for screening stocks effectively.",
                date: "May 24, 2026",
                duration: "78 mins",
                videoId: "6iBS0VzDhqc",
                resources: [
                    { name: "India BESS Sector Analysis", type: "pdf", url: "https://drive.google.com/file/d/1LrpBvzYYMEZ-XFIJUVDIm-y2NakcARQ7/view?usp=sharing" },
                    { name: "Prompts for Stock Analysis", type: "pdf", url: "https://drive.google.com/file/d/13MGCEwTYkjNLOEwUeK3zbDe7t4qKcmBC/view?usp=sharing" }
                ]
            },
            {
                id: 3,
                sessionNumber: "Session 03",
                title: "Data Center Sector Analysis & Red Flags",
                desc: "An inside look at India's booming Data Center industry and crucial red flags to avoid in stock selection.",
                date: "June 10, 2026",
                duration: "85 mins",
                videoId: "5e87dbWMAPY",
                resources: [
                    { name: "India DataCenter Sector Analysis", type: "pdf", url: "https://drive.google.com/file/d/129xyvLaG73hoMrpBQXRhbeNWvebKKhd2/view?usp=sharing" },
                    { name: "Stock Red Flags Deck", type: "pdf", url: "https://drive.google.com/file/d/148KjfQTPKVIXD0MhmsYJbthtfGRRzRPK/view?usp=sharing" }
                ]
            },
            {
                id: 4,
                sessionNumber: "Session 04",
                title: "Renewable & Nuclear Energy Sector Deep-Dive",
                desc: "Comprehensive analysis of the clean energy transition, scaling solar, wind, and nuclear power infrastructure in India.",
                date: "June 21, 2026",
                duration: "92 mins",
                videoId: "4A-xUQq5jRw",
                resources: [
                    { name: "Renewable & Nuclear Presentation", type: "slides", url: "https://drive.google.com/file/d/1UfZDgW-WJsaEXMngcQRdgnHT5SYL2WiQ/view?usp=sharing" }
                ]
            }
        ];

        // Track Current Session Index (Session 4 is default -> index 3)
        let currentSessionIndex = 3;

        // Load Session Details into DOM
        function loadSession(index) {
            currentSessionIndex = index;
            const session = sessions[index];

            // 1. Update Video Player Iframe
            const videoUrl = `https://www.youtube.com/embed/${session.videoId}?rel=0&showinfo=0&modestbranding=1`;
            document.getElementById("videoPlayer").src = videoUrl;

            // 2. Update Details
            document.getElementById("sessionTitle").innerText = session.title;
            document.getElementById("sessionDate").innerText = session.date;
            document.getElementById("sessionDuration").innerText = session.duration;
            document.getElementById("sessionDesc").innerText = session.desc;
            document.getElementById("youtubeExternalLink").href = `https://www.youtube.com/watch?v=${session.videoId}`;

            // 3. Render Resources list
            const resourceListContainer = document.getElementById("resourceList");
            resourceListContainer.innerHTML = "";
            
            session.resources.forEach(res => {
                const resourceItem = document.createElement("a");
                resourceItem.href = res.url;
                resourceItem.target = "_blank";
                resourceItem.className = "resource-item";
                
                // SVG Icons for different types
                let iconSvg = '';
                if (res.type === 'pdf') {
                    iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="res-icon pdf-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>`;
                } else if (res.type === 'slides') {
                    iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="res-icon slides-icon"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line></svg>`;
                } else {
                    iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="res-icon doc-icon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>`;
                }

                resourceItem.innerHTML = `
                    <div class="resource-info">
                        ${iconSvg}
                        <span class="resource-name">${res.name}</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="arrow-icon"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                `;
                resourceListContainer.appendChild(resourceItem);
            });

            // 4. Render Playlist (Highlights current active session)
            renderPlaylist();
        }

        // Render Session Switcher Playlist
        function renderPlaylist() {
            const playlistContainer = document.getElementById("playlistContainer");
            playlistContainer.innerHTML = "";

            // Render playlist in reverse order (Sessions 4 down to 1)
            for (let i = sessions.length - 1; i >= 0; i--) {
                const session = sessions[i];
                const isActive = (i === currentSessionIndex);
                
                const card = document.createElement("div");
                card.className = `playlist-card ${isActive ? 'active-card' : ''}`;
                card.onclick = () => loadSession(i);

                if (isActive) {
                    card.innerHTML = `
                        <div class="card-status">▶ NOW PLAYING</div>
                        <div class="card-details">
                            <h4 class="card-title">${session.title}</h4>
                            <span class="card-meta">${session.sessionNumber} &bull; ${session.duration}</span>
                        </div>
                    `;
                } else {
                    card.innerHTML = `
                        <div class="card-status-inactive">▶</div>
                        <div class="card-details">
                            <h4 class="card-title">${session.title}</h4>
                            <span class="card-meta">${session.sessionNumber} &bull; ${session.duration}</span>
                        </div>
                    `;
                }
                
                playlistContainer.appendChild(card);
            }
        }

        // Initial Load (Session 4)
        window.onload = () => {
            loadSession(3);
        };
    </script>
</body>
</html>
